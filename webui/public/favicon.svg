<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- ~22% corner radius (iOS app–icon style on a square tile) -->
  <rect width="32" height="32" rx="7" fill="#141416"/>
  <rect width="32" height="32" rx="7" fill="url(#tileShine)" opacity="0.5"/>
  <!-- 3×3 density heatmap -->
  <g opacity="0.92">
    <rect x="7" y="7" width="5" height="5" rx="1.25" fill="#2d6bb8" opacity="0.55"/>
    <rect x="13.5" y="7" width="5" height="5" rx="1.25" fill="#3b8eea" opacity="0.72"/>
    <rect x="20" y="7" width="5" height="5" rx="1.25" fill="#2d6bb8" opacity="0.5"/>
    <rect x="7" y="13.5" width="5" height="5" rx="1.25" fill="#4a9ef0" opacity="0.78"/>
    <rect x="13.5" y="13.5" width="5" height="5" rx="1.25" fill="#d29922"/>
    <rect x="20" y="13.5" width="5" height="5" rx="1.25" fill="#5aa8f2" opacity="0.68"/>
    <rect x="7" y="20" width="5" height="5" rx="1.25" fill="#3b8eea" opacity="0.48"/>
    <rect x="13.5" y="20" width="5" height="5" rx="1.25" fill="#e8a535" opacity="0.92"/>
    <rect x="20" y="20" width="5" height="5" rx="1.25" fill="#4a9ef0" opacity="0.62"/>
  </g>
  <defs>
    <linearGradient id="tileShine" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop stop-color="#fff" stop-opacity="0.07"/>
      <stop offset="1" stop-color="#fff" stop-opacity="0"/>
    </linearGradient>
  </defs>
</svg>
